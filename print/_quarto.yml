format:
  html:
    theme: cosmo
    code-copy: true
    code-overflow: wrap
    toc: true
    toc-depth: 3
  pdf:
    documentclass: scrbook
    classoption:
      # Allow parts and chapters to start on any page instead of forcing them
      # onto a recto, eliminating the blank verso pages between sections that
      # are otherwise inserted for two-sided print layouts.
      - open=any
      # Single-sided layout: same margins on every page, no recto/verso
      # distinction. Appropriate for a screen-read PDF.
      - twoside=false
    papersize: a4
    geometry:
      - margin=2.5cm
      # Reserve enough vertical space for the two-line running header
      # (part title on one line, chapter number + title on the next).
      - headheight=30pt
      - headsep=1.5em
    toc: true
    toc-depth: 3
    colorlinks: true
    code-block-bg: true
    code-block-border-left: "#2e7df6"
    # Wrap long source lines instead of letting them run off the page.
    code-overflow: wrap
    # cover-image: cover.png
    # PDF typography overrides:
    # - Suppress scrbook's automatic "Part I.", "Part II." numbering above
    #   part titles. The plain title from each part's index.md (e.g.
    #   "Introduction", "Foundations") is the single heading shown — the
    #   Roman numeral in the table of contents is the part's number.
    # - Reset the chapter counter at each part, so chapters within each part
    #   number 1, 2, 3 instead of running cumulatively across the book.
    # - Customise running headers to show "<part title> / <chapter number>.
    #   <chapter title>" on every body page. The part title is recorded by
    #   \partmark when each part starts; the chapter title (with its number)
    #   is recorded by \chaptermark when each chapter starts; \chead displays
    #   both at the top of each page.
    include-in-header:
      text: |
        \renewcommand*{\partformat}{}
        \renewcommand*{\partlineswithprefixformat}[3]{#3}
        \makeatletter
        \@addtoreset{chapter}{part}
        \makeatother
        \usepackage{scrlayer-scrpage}
        \pagestyle{scrheadings}
        \clearpairofpagestyles
        \renewcommand*{\partmark}[1]{\markboth{#1}{}}
        \renewcommand*{\chaptermark}[1]{\markright{\thechapter.\enskip #1}}
        \chead{%
          \parbox[c]{\textwidth}{\centering
            \leftmark\\
            \rightmark%
          }%
        }
        \cfoot*{\pagemark}
        % Keep every embedded image (chiefly Mermaid diagrams pre-rendered to
        % PNG by `mmdc` during the print:stage step) inside the printable area
        % while preserving aspect ratio. Quarto emits explicit pixel-derived
        % \includegraphics dimensions like `width=16in,height=1in` that
        % override the usual \setkeys{Gin} defaults, so we instead wrap
        % every image in \adjustbox with `max width` / `max totalheight`
        % constraints that *always* apply on top of any explicit size. The
        % height cap of 0.85\textheight leaves room around each figure for
        % surrounding prose; very wide flowcharts (LR layouts with many
        % nodes) shrink to fit the body width — if any specific diagram
        % becomes too small to read, the underlying Mermaid source should
        % be reshaped vertically (TB or TD) rather than relaxing the cap.
        \usepackage{graphicx}
        \usepackage{adjustbox}
        \let\OldIncludegraphics\includegraphics
        \renewcommand*{\includegraphics}[2][]{%
          \adjustbox{max width=\linewidth,max totalheight=0.85\textheight,keepaspectratio}{%
            \OldIncludegraphics[#1]{#2}%
          }%
        }
        % Wrap long source lines in code blocks. fvextra extends fancyvrb with
        % the breaklines option. Redefining Pandoc's "Highlighting" environment
        % is what actually makes long lines wrap inside syntax-highlighted code
        % blocks. We deliberately avoid `breakanywhere` because it can interfere
        % with Pandoc's colour-command escape sequences and silently drop
        % syntax highlighting on affected blocks. The default fvextra
        % continuation symbol (↪) on the left signals that a line was wrapped;
        % we keep it so the reader can tell hard line breaks from soft ones.
        \usepackage{fvextra}
        \DefineVerbatimEnvironment{Highlighting}{Verbatim}{
          commandchars=\\\{\},
          breaklines,
          breakautoindent=true,
          fontsize=\small
        }
  epub:
    toc: true
    toc-depth: 3
    # cover-image: cover.png

execute:
  enabled: false
